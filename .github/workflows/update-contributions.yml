name: Update GitHub Contributions

on:
  schedule:
    - cron: "0 */12 * * *" # Günde 2 kez (12 saatte bir) otomatik çalışır
  workflow_dispatch: # İstediğin zaman manuel tetikleyebilmen için buton ekler

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dosyayı kaydedebilmesi için bota yetki veriyoruz
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch GitHub Contributions Data
        run: |
          # GitHub GraphQL API kullanarak sadece kendi verilerini çekiyoruz
          QUERY='{"query": "query { user(login: \"ahmetberahasanoglu\") { contributionsCollection { contributionCalendar { weeks { contributionDays { contributionCount date } } } } } }"}'
          curl -H "Authorization: bearer ${{ secrets.GITHUB_TOKEN }}" \
               -X POST \
               -d "$QUERY" \
               https://api.github.com/graphql > contributions.json

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add contributions.json
          git commit -m "chore: update contributions heatmap [skip ci]" || true
          git push
